<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Layout Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Clash+Display:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --panel:    #111118;
      --border:   #1e1e2e;
      --border2:  #2a2a3e;
      --text:     #cdd6f4;
      --muted:    #585b70;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Clash Display', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 320px 1fr 300px;
      grid-template-areas:
        "header header header"
        "left   canvas right";
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-area: header;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      background: var(--panel);
    }
    .logo {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      color: #cdd6f4;
      letter-spacing: -0.01em;
    }
    .logo span { color: #89b4fa; }
    .header-sep { flex: 1; }
    .api-input {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      width: 260px;
      outline: none;
    }
    .api-input:focus { border-color: #89b4fa; }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .dot.on  { background: #a6e3a1; box-shadow: 0 0 6px #a6e3a1; }
    .dot.off { background: #f38ba8; }

    /* ── Left panel — upload + legend ── */
    .left-panel {
      grid-area: left;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Upload */
    .upload-zone {
      border: 1px dashed var(--border2);
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .upload-zone:hover { border-color: #89b4fa; background: rgba(137,180,250,0.04); }
    .upload-zone.drag  { border-color: #89b4fa; background: rgba(137,180,250,0.08); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 24px; margin-bottom: 8px; }
    .upload-hint { color: var(--muted); font-size: 11px; line-height: 1.6; }
    .upload-hint strong { color: #89b4fa; }

    .run-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #89b4fa;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .run-btn:hover:not(:disabled) { filter: brightness(1.1); }
    .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Legend */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .legend-item:hover { background: rgba(255,255,255,0.03); }
    .legend-item.hidden-type { opacity: 0.35; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-name { flex: 1; font-size: 11px; }
    .legend-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      min-width: 22px;
      text-align: center;
    }

    /* Conf slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row label { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .slider-row input[type=range] { flex: 1; accent-color: #89b4fa; }
    .slider-val { font-size: 11px; color: #89b4fa; width: 32px; text-align: right; }

    /* ── Canvas area ── */
    .canvas-area {
      grid-area: canvas;
      position: relative;
      overflow: auto;
      background:
        radial-gradient(circle at 50% 50%, rgba(137,180,250,0.03) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      flex-shrink: 0;
    }
    .image-wrapper img {
      display: block;
      max-width: 100%;
      border: 1px solid var(--border2);
      border-radius: 4px;
    }

    /* Overlay boxes */
    .overlay-box {
      position: absolute;
      border: 2px solid;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .overlay-box:hover { z-index: 100; }
    .overlay-box .box-label {
      position: absolute;
      top: -22px;
      left: -1px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px 3px 0 0;
      white-space: nowrap;
      pointer-events: none;
    }
    .overlay-box .box-order {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 9px;
      opacity: 0.6;
    }
    .overlay-box.selected {
      z-index: 50;
    }
    .overlay-box .fill {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      transition: opacity 0.15s;
    }
    .overlay-box:hover .fill { opacity: 0.16; }
    .overlay-box.selected .fill { opacity: 0.18; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      gap: 12px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-text { font-size: 12px; }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,15,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border2);
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading-text { color: var(--muted); font-size: 11px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Right panel — block details ── */
    .right-panel {
      grid-area: right;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Summary chips */
    .summary-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .chip {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: 0.05em;
    }

    /* Block list */
    .block-list { flex: 1; overflow-y: auto; }
    .block-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .block-item:hover { background: rgba(255,255,255,0.02); }
    .block-item.active { background: rgba(137,180,250,0.06); }
    .block-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .block-badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .block-order { color: var(--muted); font-size: 10px; margin-left: auto; }
    .block-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .meta-row { font-size: 10px; color: var(--muted); }
    .meta-row span { color: var(--text); }
    .conf-bar {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .conf-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* JSON output at bottom */
    .json-panel {
      border-top: 1px solid var(--border);
    }
    .json-toggle {
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
      transition: color 0.15s;
    }
    .json-toggle:hover { color: var(--text); }
    .json-output {
      display: none;
      padding: 12px 16px;
      font-size: 10px;
      color: #a6e3a1;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 280px;
      overflow-y: auto;
      background: var(--bg);
    }
    .json-output.open { display: block; }

    /* No selection state */
    .no-selection {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.8;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Layout <span>Analyzer</span></div>
  <div class="header-sep"></div>
  <input class="api-input" id="apiUrl" value="http://127.0.0.1:8001/layout" placeholder="API endpoint">
  <div class="status-pill">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">checking...</span>
  </div>
</header>

<!-- Left Panel -->
<div class="left-panel">

  <div class="panel-section">
    <div class="panel-label">Input</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*,.pdf">
      <div class="upload-icon">⊕</div>
      <div class="upload-hint">
        <strong>Upload page image</strong><br>
        PNG · JPG · PDF page<br>
        scanned or digital
      </div>
    </div>
    <button class="run-btn" id="runBtn" disabled onclick="analyze()">
      Analyze Layout
    </button>
  </div>

  <div class="panel-section">
    <div class="panel-label">Confidence threshold</div>
    <div class="slider-row">
      <label>min conf</label>
      <input type="range" id="confSlider" min="0" max="1" step="0.05" value="0.25"
             oninput="onConfChange(this.value)">
      <span class="slider-val" id="confVal">0.25</span>
    </div>
  </div>

  <div class="panel-section" style="flex:1">
    <div class="panel-label">Legend <span style="color:#585b70;font-size:9px">— click to toggle</span></div>
    <div id="legendList"></div>
  </div>

</div>

<!-- Canvas -->
<div class="canvas-area" id="canvasArea">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Running layout detection...</div>
  </div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⬚</div>
    <div class="empty-text">Upload a page image to begin</div>
  </div>
  <div class="image-wrapper" id="imageWrapper" style="display:none">
    <img id="pageImage" src="" alt="Page">
    <!-- overlay boxes injected here -->
  </div>
</div>

<!-- Right Panel -->
<div class="right-panel">
  <div class="panel-section">
    <div class="panel-label">Summary</div>
    <div class="summary-chips" id="summaryChips" style="padding:0;border:none">
      <div style="color:var(--muted);font-size:11px">No results yet</div>
    </div>
  </div>

  <div class="panel-label" style="padding:12px 16px 0">Blocks</div>
  <div class="block-list" id="blockList">
    <div class="no-selection">
      Detected blocks will appear here.<br>
      Click any block to inspect it.
    </div>
  </div>

  <div class="json-panel">
    <button class="json-toggle" onclick="toggleJson()">▶ Raw JSON output</button>
    <pre class="json-output" id="jsonOutput"></pre>
  </div>
</div>


<script>
  // ── State ──────────────────────────────────────────────────────
  let allBlocks    = [];
  let labelMeta    = {};
  let hiddenTypes  = new Set();
  let selectedId   = null;
  let minConf      = 0.25;
  let rawResponse  = null;
  let imgNaturalW  = 0;
  let imgNaturalH  = 0;

  // ── Health check ───────────────────────────────────────────────
  async function checkHealth() {
    const base = document.getElementById("apiUrl").value.replace("/layout","");
    try {
      const r = await fetch(base + "/health", { signal: AbortSignal.timeout(2000) });
      setStatus(r.ok, r.ok ? "online" : "error");
    } catch { setStatus(false, "offline"); }
  }
  function setStatus(ok, txt) {
    document.getElementById("dot").className = "dot " + (ok ? "on" : "off");
    document.getElementById("statusTxt").textContent = txt;
  }
  checkHealth();
  setInterval(checkHealth, 5000);

  // ── File input ─────────────────────────────────────────────────
  const fileInput  = document.getElementById("fileInput");
  const uploadZone = document.getElementById("uploadZone");
  const runBtn     = document.getElementById("runBtn");

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) runBtn.disabled = false;
  });
  uploadZone.addEventListener("dragover",  e => { e.preventDefault(); uploadZone.classList.add("drag"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("drag");
    if (e.dataTransfer.files[0]) {
      fileInput.files = e.dataTransfer.files;
      runBtn.disabled = false;
    }
  });

  // ── Analyze ────────────────────────────────────────────────────
  async function analyze() {
    const file = fileInput.files[0];
    if (!file) return;

    runBtn.disabled = true;
    runBtn.textContent = "Analyzing...";
    document.getElementById("loadingOverlay").classList.add("active");

    const formData = new FormData();
    formData.append("file", file);

    try {
      const resp = await fetch(document.getElementById("apiUrl").value, {
        method: "POST",
        body: formData
      });
      if (!resp.ok) throw new Error("Server error " + resp.status);
      rawResponse = await resp.json();
      renderResults(rawResponse, file);
    } catch(e) {
      alert("Error: " + e.message);
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = "Analyze Layout";
      document.getElementById("loadingOverlay").classList.remove("active");
    }
  }

  // ── Render results ─────────────────────────────────────────────
  function renderResults(data, file) {
    allBlocks   = data.blocks;
    labelMeta   = data.label_meta;
    hiddenTypes = new Set();

    // Show image
    const url = URL.createObjectURL(file);
    const img = document.getElementById("pageImage");
    img.onload = () => {
      imgNaturalW = img.naturalWidth;
      imgNaturalH = img.naturalHeight;
      drawOverlays();
    };
    img.src = url;

    document.getElementById("emptyState").style.display   = "none";
    document.getElementById("imageWrapper").style.display = "inline-block";

    renderLegend(data.summary);
    renderSummaryChips(data.summary);
    renderBlockList();

    // JSON output
    document.getElementById("jsonOutput").textContent = JSON.stringify(data, null, 2);
  }

  // ── Overlays ───────────────────────────────────────────────────
  function drawOverlays() {
    const wrapper = document.getElementById("imageWrapper");
    const img     = document.getElementById("pageImage");

    // Remove old overlays
    wrapper.querySelectorAll(".overlay-box").forEach(el => el.remove());

    const scaleX = img.clientWidth  / imgNaturalW;
    const scaleY = img.clientHeight / imgNaturalH;

    const visible = allBlocks.filter(b =>
      b.confidence >= minConf && !hiddenTypes.has(b.label)
    );

    visible.forEach(block => {
      const [x1, y1, x2, y2] = block.bbox;
      const color = (labelMeta[block.label] || {}).color || "#ffffff";

      const box = document.createElement("div");
      box.className = "overlay-box" + (block.id === selectedId ? " selected" : "");
      box.style.cssText = `
        left:   ${x1 * scaleX}px;
        top:    ${y1 * scaleY}px;
        width:  ${(x2 - x1) * scaleX}px;
        height: ${(y2 - y1) * scaleY}px;
        border-color: ${color};
      `;

      const fill = document.createElement("div");
      fill.className = "fill";
      fill.style.background = color;
      box.appendChild(fill);

      const label = document.createElement("div");
      label.className = "box-label";
      label.style.cssText = `background:${color}; color:#0a0a0f`;
      label.textContent = block.label.replace("_"," ");
      box.appendChild(label);

      const order = document.createElement("div");
      order.className = "box-order";
      order.style.color = color;
      order.textContent = "#" + block.reading_order;
      box.appendChild(order);

      box.addEventListener("click", () => selectBlock(block.id));
      wrapper.appendChild(box);
    });
  }

  // ── Select block ───────────────────────────────────────────────
  function selectBlock(id) {
    selectedId = id;
    drawOverlays();

    // Highlight in list
    document.querySelectorAll(".block-item").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.id) === id);
    });

    // Scroll list item into view
    const active = document.querySelector(`.block-item[data-id="${id}"]`);
    if (active) active.scrollIntoView({ block: "nearest" });
  }

  // ── Legend ─────────────────────────────────────────────────────
  function renderLegend(summary) {
    const list = document.getElementById("legendList");
    list.innerHTML = "";
    Object.entries(labelMeta).forEach(([lbl, meta]) => {
      const count = summary[lbl] || 0;
      const item = document.createElement("div");
      item.className = "legend-item" + (hiddenTypes.has(lbl) ? " hidden-type" : "");
      item.innerHTML = `
        <div class="legend-dot" style="background:${meta.color}"></div>
        <span class="legend-name">${lbl.replace(/_/g," ")}</span>
        <span class="legend-count">${count}</span>
      `;
      item.addEventListener("click", () => toggleType(lbl, item));
      list.appendChild(item);
    });
  }

  function toggleType(lbl, el) {
    if (hiddenTypes.has(lbl)) hiddenTypes.delete(lbl);
    else hiddenTypes.add(lbl);
    el.classList.toggle("hidden-type");
    drawOverlays();
    renderBlockList();
  }

  // ── Summary chips ──────────────────────────────────────────────
  function renderSummaryChips(summary) {
    const el = document.getElementById("summaryChips");
    el.innerHTML = "";
    Object.entries(summary).forEach(([lbl, count]) => {
      const meta = labelMeta[lbl] || { color: "#fff" };
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.style.cssText = `color:${meta.color}; border-color:${meta.color}40; background:${meta.color}10`;
      chip.textContent = `${lbl.replace(/_/g," ")} ×${count}`;
      el.appendChild(chip);
    });
  }

  // ── Block list ─────────────────────────────────────────────────
  function renderBlockList() {
    const list = document.getElementById("blockList");
    const visible = allBlocks.filter(b =>
      b.confidence >= minConf && !hiddenTypes.has(b.label)
    );

    if (!visible.length) {
      list.innerHTML = `<div class="no-selection">No blocks match current filters</div>`;
      return;
    }

    list.innerHTML = "";
    visible.forEach(block => {
      const meta  = labelMeta[block.label] || { color: "#fff", desc: "" };
      const item  = document.createElement("div");
      item.className = "block-item" + (block.id === selectedId ? " active" : "");
      item.dataset.id = block.id;
      item.innerHTML = `
        <div class="block-header">
          <div class="block-badge" style="background:${meta.color}18; color:${meta.color}">
            ${block.label.replace(/_/g," ")}
          </div>
          <span class="block-order">#${block.reading_order}</span>
        </div>
        <div class="block-meta">
          <div class="meta-row">conf <span>${(block.confidence * 100).toFixed(0)}%</span></div>
          <div class="meta-row">area <span>${block.area_pct}%</span></div>
          <div class="meta-row">x <span>${block.bbox[0]}</span></div>
          <div class="meta-row">y <span>${block.bbox[1]}</span></div>
          <div class="meta-row">w <span>${block.bbox[2] - block.bbox[0]}px</span></div>
          <div class="meta-row">h <span>${block.bbox[3] - block.bbox[1]}px</span></div>
        </div>
        <div class="conf-bar">
          <div class="conf-fill" style="width:${block.confidence*100}%; background:${meta.color}"></div>
        </div>
      `;
      item.addEventListener("click", () => selectBlock(block.id));
      list.appendChild(item);
    });
  }

  // ── Conf slider ────────────────────────────────────────────────
  function onConfChange(val) {
    minConf = parseFloat(val);
    document.getElementById("confVal").textContent = parseFloat(val).toFixed(2);
    if (allBlocks.length) { drawOverlays(); renderBlockList(); }
  }

  // ── JSON toggle ────────────────────────────────────────────────
  function toggleJson() {
    const el  = document.getElementById("jsonOutput");
    const btn = document.querySelector(".json-toggle");
    const open = el.classList.toggle("open");
    btn.textContent = (open ? "▼" : "▶") + " Raw JSON output";
  }

  // ── Redraw on window resize ────────────────────────────────────
  window.addEventListener("resize", () => {
    if (allBlocks.length) drawOverlays();
  });
</script>

</body>
</html>
